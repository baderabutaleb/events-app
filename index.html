<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<title>Events</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon.ico" />
<link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <aside id="sidebar" class="sidebar" aria-label="Navigation">
    <div class="sidebar-header">
      <span class="brand">Events</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="upcoming">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        Upcoming
      </button>
      <button class="nav-item" data-view="past">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        Past Events
      </button>
    </nav>
  </aside>

  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <header class="topbar">
    <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>
    <div class="topbar-spacer"></div>
    <h1 id="view-title" class="view-title">Upcoming</h1>
  </header>

  <main class="main">
    <section id="event-list" class="event-list" aria-live="polite"></section>
    <div id="empty-state" class="empty-state hidden">
      <p>No events yet.</p>
      <span>Tap + to create one.</span>
    </div>
  </main>

  <button id="add-btn" class="add-btn" aria-label="Create event">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <header class="modal-header">
        <h2 id="modal-title">Create Event</h2>
        <button id="modal-close" class="icon-btn" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </header>
      <form id="event-form" class="modal-body" autocomplete="off">
        <label class="field">
          <span>Category</span>
          <select id="field-category" required>
            <option value="" disabled selected>Select category</option>
            <option value="Uni">Uni</option>
            <option value="Health">Health</option>
            <option value="Life">Life</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <label class="field hidden" id="field-custom-wrap">
          <span>Event type</span>
          <input id="field-custom" type="text" placeholder="Specify type" />
        </label>

        <label class="field">
          <span>Choose time</span>
          <input id="field-datetime" type="datetime-local" required />
        </label>

        <label class="field">
          <span>Description</span>
          <input id="field-description" type="text" required placeholder="Short title" />
        </label>

        <label class="field">
          <span>Notes</span>
          <textarea id="field-notes" rows="3" placeholder="Optional"></textarea>
        </label>

        <button type="button" id="modal-delete" class="btn btn-danger hidden">Delete event</button>
        <div class="modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button type="submit" id="modal-submit" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
